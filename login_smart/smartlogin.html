<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Tela do Login</title>
    <link rel="stylesheet" href="smartlogin.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>
    <div class="gradient">
        <div class="container d-flex align-items-center justify-content-center login-container">
        <div class="login-card text-center bg-white">
            <img src="./logo/unnamed.png" alt="logo" class="logo">
            <h4 class="mb-3 text">Sistema de Estoque</h4>
            <p class="text mb-4">Acesse sua Conta</p>

            <form action="">
                <div class="row g-3 align-items-center mb-2">
                    <div class="col-auto">
                        <label for="inputPassword6" class="col-form-label">Email</label>
                    </div>
                    <div class="col-auto">
                        <input type="email" id="inputemail" class="form-control"
                            aria-describedby="emailHelpInline" placeholder="Digite seu email"
                            required>
                    </div>
                </div>
                <div class="row g-3 align-items-center mt-1">
                    <div class="col-auto">
                        <label for="inputPassword6" class="col-form-label">Senha</label>
                    </div>
                    <div class="col-auto">
                        <input type="password" id="inputPassword6" class="form-control"
                            aria-describedby="passwordHelpInline" placeholder="Digite seu senha"
                            required>
                    </div>
                    <div class="text-end mt-1">
                        <a href="" class="text-decoration-none" style="font-size: 13px;">
                            Esqueci minha senha
                        </a>
                    </div>
                </div>
                <button class="btn btn-login w-100 white text mt-2">Entrar</button>
            </form>
            <div class="mt-4 text" style="font-size: 13px;">
                © 2026 SmartMeds - Sistema de Estoque
            </div>
        </div>
    </div>
    </div>
</body>
</html>
