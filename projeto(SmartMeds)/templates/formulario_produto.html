{% extends 'base.html' %}

{% block conteudo %}

<div class="mb-4">
    <h2 class="titulo-pagina">
        <i class="bi bi-box"></i> 
        {{ 'Editar Produto' if produto and produto.id else 'Cadastrar Produto' }}
    </h2>
    <p class="text-muted">Preencha as informações do produto</p>
</div>

<div class="card">
    <div class="card-body">

        <form method="POST"
              action="{% if produto and produto.id %}
                        {{ url_for('atualizar_produto', id=produto.id) }}
                      {% else %}
                        {{ url_for('salvar_produto') }}
                      {% endif %}">

            <div class="row">

                <!-- NOME -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Nome</label>
                    <input type="text" name="nome"
                           class="form-control"
                           value="{{ produto.nome if produto else '' }}"
                           placeholder="Nome do produto"
                           required>
                </div>

                <!-- CATEGORIA -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Categoria</label>
                    <input type="text" name="categoria"
                           class="form-control"
                           value="{{ produto.categoria if produto else '' }}"
                           placeholder="Ex: Eletrônicos, Alimentos">
                </div>

                <!-- DESCRIÇÃO -->
                <div class="col-md-12 mb-3">
                    <label class="form-label">Descrição</label>
                    <input type="text" name="descricao"
                           class="form-control"
                           value="{{ produto.descricao if produto else '' }}"
                           placeholder="Descrição do produto">
                </div>

                <!-- UNIDADE -->
                <div class="col-md-4 mb-3">
                    <label class="form-label">Unidade</label>
                    <input type="text" name="unidade_medida"
                           class="form-control"
                           value="{{ produto.unidade_medida if produto else '' }}"
                           placeholder="Ex: un, kg, caixa">
                </div>

                <!-- QUANTIDADE -->
                <div class="col-md-4 mb-3">
                    <label class="form-label">Quantidade</label>
                    <input type="number" name="quantidade"
                           class="form-control"
                           min="0"
                           value="{{ produto.quantidade if produto else 0 }}"
                           required>
                </div>

                <!-- ESTOQUE MÍNIMO -->
                <div class="col-md-4 mb-3">
                    <label class="form-label">Estoque mínimo</label>
                    <input type="number" name="estoque_minimo"
                           class="form-control"
                           min="0"
                           value="{{ produto.estoque_minimo if produto else 0 }}"
                           required>
                </div>

            </div>

            <!-- BOTÕES -->
            <div class="d-flex justify-content-end gap-2 mt-3">

                <a href="{{ url_for('produtos') }}"
                   class="btn btn-outline-light">
                    <i class="bi bi-arrow-left"></i> Cancelar
                </a>

                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> Salvar
                </button>

            </div>

        </form>

    </div>
</div>

{% endblock %}
